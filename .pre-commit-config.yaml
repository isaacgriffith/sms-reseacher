repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check (Python lint)
        language: system
        entry: uv run ruff check
        args: ["backend/src", "agents/src", "db/src", "agent-eval/src", "researcher-mcp/src"]
        pass_filenames: false
        types: [python]

      - id: ruff-format
        name: ruff format (Python format check)
        language: system
        entry: uv run ruff format --check
        args: ["backend/src", "agents/src", "db/src", "agent-eval/src", "researcher-mcp/src"]
        pass_filenames: false
        types: [python]

      - id: mypy
        name: mypy (type check)
        language: system
        entry: uv run mypy
        args: ["backend/src", "agents/src", "db/src", "agent-eval/src", "researcher-mcp/src"]
        pass_filenames: false
        types: [python]

      - id: pytest
        name: pytest (unit tests)
        language: system
        entry: uv run pytest
        args: ["backend/tests/unit", "agents/tests/unit", "db/tests/unit"]
        pass_filenames: false
        types: [python]

      - id: hadolint-backend
        name: hadolint (backend/Dockerfile)
        language: system
        entry: hadolint
        args: ["backend/Dockerfile"]
        pass_filenames: false
        files: ^backend/Dockerfile$

      - id: hadolint-researcher-mcp
        name: hadolint (researcher-mcp/Dockerfile)
        language: system
        entry: hadolint
        args: ["researcher-mcp/Dockerfile"]
        pass_filenames: false
        files: ^researcher-mcp/Dockerfile$

      - id: hadolint-frontend
        name: hadolint (frontend/Dockerfile)
        language: system
        entry: hadolint
        args: ["frontend/Dockerfile"]
        pass_filenames: false
        files: ^frontend/Dockerfile$
