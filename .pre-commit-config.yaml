repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check (Python lint)
        language: system
        entry: uv run ruff check
        args: ["backend/src", "agents/src", "db/src", "agent-eval/src", "researcher-mcp/src"]
        pass_filenames: false
        types: [python]

      - id: ruff-format
        name: ruff format (Python format check)
        language: system
        entry: uv run ruff format --check
        args: ["backend/src", "agents/src", "db/src", "agent-eval/src", "researcher-mcp/src"]
        pass_filenames: false
        types: [python]

      - id: mypy
        name: mypy (type check)
        language: system
        entry: uv run mypy
        args: ["backend/src", "agents/src", "db/src", "agent-eval/src", "researcher-mcp/src"]
        pass_filenames: false
        types: [python]

      - id: pytest
        name: pytest (unit tests)
        language: system
        entry: uv run pytest
        args: ["backend/tests/unit", "agents/tests/unit", "db/tests/unit"]
        pass_filenames: false
        types: [python]
