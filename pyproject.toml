[tool.uv.workspace]
members = ["backend", "agents", "db", "agent-eval", "researcher-mcp"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
addopts = "--import-mode=importlib"

[tool.mypy]
# Root-level mypy config provides workspace-wide third-party overrides.
# Per-package strict settings live in each subproject's pyproject.toml.
python_version = "3.14"

[[tool.mypy.overrides]]
# Third-party packages without py.typed or type stubs
module = [
    "plotly",
    "plotly.*",
    "jose",
    "jose.*",
    "qrcode",
    "qrcode.*",
    "springernature_api_client",
    "springernature_api_client.*",
    "pybliometrics",
    "pybliometrics.*",
    "scholarly",
    "scholarly.*",
    "weasyprint",
    "weasyprint.*",
]
ignore_missing_imports = true

[tool.uv]
dev-dependencies = [
    "pre-commit>=3.7",
    "ruff>=0.4",
    "mypy>=1.10",
    "pytest>=8",
    "pytest-asyncio>=0.23",
    "pytest-cov>=5",
    "cosmic-ray>=8.3",
]
