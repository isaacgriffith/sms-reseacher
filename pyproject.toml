[tool.uv.workspace]
members = ["backend", "agents", "db", "agent-eval", "researcher-mcp"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
addopts = "--import-mode=importlib"

[tool.uv]
dev-dependencies = [
    "pre-commit>=3.7",
    "ruff>=0.4",
    "mypy>=1.10",
    "pytest>=8",
    "pytest-asyncio>=0.23",
    "pytest-cov>=5",
    "cosmic-ray>=8.3",
]
