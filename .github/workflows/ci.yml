name: CI

on:
  push:
    branches: ["**"]
  pull_request:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  # ── Python: Lint ─────────────────────────────────────────────────────────────
  python-lint:
    name: Python Lint (ruff + mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.14

      - name: Install dependencies
        run: uv sync --all-packages

      - name: Ruff check
        run: |
          uv run ruff check \
            backend/src agents/src db/src agent-eval/src researcher-mcp/src

      - name: Ruff format check
        run: |
          uv run ruff format --check \
            backend/src agents/src db/src agent-eval/src researcher-mcp/src

      - name: MyPy type check
        run: |
          uv run mypy \
            backend/src agents/src db/src agent-eval/src researcher-mcp/src

  # ── Python: Tests (matrix) ───────────────────────────────────────────────────
  python-test:
    name: Python Tests — ${{ matrix.package }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: sms-backend
            testdir: backend/tests
            covdir: backend
          - package: agents
            testdir: agents/tests
            covdir: agents
          - package: db
            testdir: db/tests
            covdir: db
          - package: sms-agent-eval
            testdir: agent-eval/tests
            covdir: agent-eval
          - package: sms-researcher-mcp
            testdir: researcher-mcp/tests
            covdir: researcher-mcp
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.14

      - name: Install dependencies
        run: uv sync --all-packages

      - name: Run pytest with coverage
        run: |
          uv run --package ${{ matrix.package }} pytest ${{ matrix.testdir }} \
            --cov-report=xml:${{ matrix.covdir }}/coverage.xml \
            --cov-fail-under=85

      - name: Post coverage comment
        uses: MishaKav/pytest-coverage-comment@main
        if: github.event_name == 'pull_request'
        with:
          pytest-xml-coverage-path: ${{ matrix.covdir }}/coverage.xml
          title: "Coverage — ${{ matrix.package }}"

  # ── Frontend: Lint ───────────────────────────────────────────────────────────
  frontend-lint:
    name: Frontend Lint (eslint + prettier)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: ESLint
        run: npm run lint
        working-directory: frontend

      - name: Prettier format check
        run: npm run format:check
        working-directory: frontend

  # ── Frontend: Tests ──────────────────────────────────────────────────────────
  frontend-test:
    name: Frontend Tests (vitest + coverage)
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Run Vitest with coverage
        run: npm run test:coverage
        working-directory: frontend

      - name: Post coverage comment
        uses: davelosert/vitest-coverage-report-action@v2
        if: github.event_name == 'pull_request'
        with:
          working-directory: frontend

  # ── E2e Tests (Playwright) ────────────────────────────────────────────────────
  e2e-tests:
    name: E2e Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [python-test, frontend-test]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: sms
          POSTGRES_PASSWORD: sms
          POSTGRES_DB: sms_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql+asyncpg://sms:sms@localhost:5432/sms_test
      SECRET_KEY: test-secret-key
      LLM_PROVIDER: mock
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.14

      - name: Install Python dependencies
        run: uv sync --all-packages

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: frontend

      - name: Apply database migrations
        run: uv run alembic upgrade head

      - name: Run Playwright e2e tests
        run: npx playwright test
        working-directory: frontend

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: frontend/playwright-report/

  # ── Docker: Build, Lint, Scan ─────────────────────────────────────────────────
  docker-build-scan:
    name: Docker Build + Hadolint + Trivy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install hadolint
        run: |
          wget -qO /usr/local/bin/hadolint \
            https://github.com/hadolint/hadolint/releases/latest/download/hadolint-Linux-x86_64
          chmod +x /usr/local/bin/hadolint

      - name: Hadolint — backend
        run: hadolint backend/Dockerfile

      - name: Hadolint — researcher-mcp
        run: hadolint researcher-mcp/Dockerfile

      - name: Hadolint — frontend
        run: hadolint frontend/Dockerfile

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/Dockerfile
          push: false
          tags: sms-backend:ci
          load: true

      - name: Build researcher-mcp image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: researcher-mcp/Dockerfile
          push: false
          tags: sms-researcher-mcp:ci
          load: true

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: frontend/Dockerfile
          push: false
          tags: sms-frontend:ci
          load: true

      - name: Install Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "image"
          image-ref: "sms-backend:ci"
          trivy-config: .trivyignore
          exit-code: "1"
          severity: "CRITICAL,HIGH"

      - name: Trivy scan — researcher-mcp
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "image"
          image-ref: "sms-researcher-mcp:ci"
          trivy-config: .trivyignore
          exit-code: "1"
          severity: "CRITICAL,HIGH"

      - name: Trivy scan — frontend
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "image"
          image-ref: "sms-frontend:ci"
          trivy-config: .trivyignore
          exit-code: "1"
          severity: "CRITICAL,HIGH"

  # ── GHCR Push (main branch only) ─────────────────────────────────────────────
  ghcr-push:
    name: Push to GHCR
    runs-on: ubuntu-latest
    needs: [python-lint, python-test, frontend-lint, frontend-test, e2e-tests, docker-build-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/sms-backend:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}/sms-backend:latest

      - name: Push researcher-mcp image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: researcher-mcp/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/sms-researcher-mcp:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}/sms-researcher-mcp:latest

      - name: Push frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/sms-frontend:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}/sms-frontend:latest
