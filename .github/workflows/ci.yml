name: CI

on:
  push:
    branches: ["**"]
  pull_request:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  # ── Python: Lint ─────────────────────────────────────────────────────────────
  python-lint:
    name: Python Lint (ruff + mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.14

      - name: Install dependencies
        run: uv sync --all-packages

      - name: Ruff check
        run: |
          uv run ruff check \
            backend/src agents/src db/src agent-eval/src researcher-mcp/src

      - name: Ruff format check
        run: |
          uv run ruff format --check \
            backend/src agents/src db/src agent-eval/src researcher-mcp/src

      - name: MyPy type check
        run: |
          uv run mypy \
            backend/src agents/src db/src agent-eval/src researcher-mcp/src

  # ── Python: Tests (matrix) ───────────────────────────────────────────────────
  python-test:
    name: Python Tests — ${{ matrix.package }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: sms-backend
            testdir: backend/tests
          - package: sms-agents
            testdir: agents/tests
          - package: sms-db
            testdir: db/tests
          - package: sms-agent-eval
            testdir: agent-eval/tests
          - package: sms-researcher-mcp
            testdir: researcher-mcp/tests
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.14

      - name: Install dependencies
        run: uv sync --all-packages

      - name: Run pytest with coverage
        run: |
          uv run --package ${{ matrix.package }} pytest ${{ matrix.testdir }} \
            --cov-fail-under=85

  # ── Python: Mutation Testing (matrix) ───────────────────────────────────────
  python-mutation:
    name: Python Mutation — ${{ matrix.package }}
    runs-on: ubuntu-latest
    needs: python-test
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: sms-backend
            srcdir: backend/src
          - package: sms-agents
            srcdir: agents/src
          - package: sms-db
            srcdir: db/src
          - package: sms-agent-eval
            srcdir: agent-eval/src
          - package: sms-researcher-mcp
            srcdir: researcher-mcp/src
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.14

      - name: Install dependencies
        run: uv sync --all-packages

      - name: Run mutmut
        run: |
          uv run --package ${{ matrix.package }} mutmut run
        working-directory: .

      - name: Check mutation score ≥ 85%
        run: |
          RESULT=$(uv run --package ${{ matrix.package }} mutmut results 2>&1 || true)
          echo "$RESULT"
          SURVIVED=$(echo "$RESULT" | grep -oP '(?<=Survived: )\d+' || echo "0")
          KILLED=$(echo "$RESULT" | grep -oP '(?<=Killed: )\d+' || echo "0")
          TOTAL=$((SURVIVED + KILLED))
          if [ "$TOTAL" -eq 0 ]; then
            echo "No mutants generated — skipping score check"
            exit 0
          fi
          SCORE=$(echo "scale=2; $KILLED * 100 / $TOTAL" | bc)
          echo "Mutation score: ${SCORE}% (killed=$KILLED, survived=$SURVIVED)"
          if (( $(echo "$SCORE < 85" | bc -l) )); then
            echo "FAIL: mutation score ${SCORE}% is below the 85% threshold"
            exit 1
          fi

  # ── Frontend: Lint ───────────────────────────────────────────────────────────
  frontend-lint:
    name: Frontend Lint (eslint + prettier)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: ESLint
        run: npm run lint
        working-directory: frontend

      - name: Prettier format check
        run: npm run format:check
        working-directory: frontend

  # ── Frontend: Tests ──────────────────────────────────────────────────────────
  frontend-test:
    name: Frontend Tests (vitest + coverage)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Run Vitest with coverage
        run: npm run test:coverage
        working-directory: frontend

      - name: Check coverage ≥ 85%
        run: |
          if [ -f frontend/coverage/coverage-summary.json ]; then
            LINES=$(node -e "const c=require('./frontend/coverage/coverage-summary.json'); \
              console.log(c.total.lines.pct)")
            echo "Line coverage: ${LINES}%"
            if (( $(echo "$LINES < 85" | bc -l) )); then
              echo "FAIL: coverage ${LINES}% below 85%"
              exit 1
            fi
          fi

  # ── Frontend: Mutation Testing (Stryker) ─────────────────────────────────────
  frontend-mutation:
    name: Frontend Mutation (Stryker)
    runs-on: ubuntu-latest
    needs: frontend-test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Run Stryker
        run: npx stryker run
        working-directory: frontend

  # ── Docker: Build, Lint, Scan ─────────────────────────────────────────────────
  docker-build-scan:
    name: Docker Build + Hadolint + Trivy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Install hadolint
        run: |
          wget -qO /usr/local/bin/hadolint \
            https://github.com/hadolint/hadolint/releases/latest/download/hadolint-Linux-x86_64
          chmod +x /usr/local/bin/hadolint

      - name: Hadolint — backend
        run: hadolint backend/Dockerfile

      - name: Hadolint — researcher-mcp
        run: hadolint researcher-mcp/Dockerfile

      - name: Hadolint — frontend
        run: hadolint frontend/Dockerfile

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/Dockerfile
          push: false
          tags: sms-backend:ci
          load: true

      - name: Build researcher-mcp image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: researcher-mcp/Dockerfile
          push: false
          tags: sms-researcher-mcp:ci
          load: true

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: frontend/Dockerfile
          push: false
          tags: sms-frontend:ci
          load: true

      - name: Install Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "image"
          image-ref: "sms-backend:ci"
          trivy-config: .trivyignore
          exit-code: "1"
          severity: "CRITICAL,HIGH"

      - name: Trivy scan — researcher-mcp
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "image"
          image-ref: "sms-researcher-mcp:ci"
          trivy-config: .trivyignore
          exit-code: "1"
          severity: "CRITICAL,HIGH"

      - name: Trivy scan — frontend
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "image"
          image-ref: "sms-frontend:ci"
          trivy-config: .trivyignore
          exit-code: "1"
          severity: "CRITICAL,HIGH"

  # ── GHCR Push (main branch only) ─────────────────────────────────────────────
  ghcr-push:
    name: Push to GHCR
    runs-on: ubuntu-latest
    needs: [python-lint, python-test, frontend-lint, frontend-test, docker-build-scan]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/sms-backend:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}/sms-backend:latest

      - name: Push researcher-mcp image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: researcher-mcp/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/sms-researcher-mcp:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}/sms-researcher-mcp:latest

      - name: Push frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/sms-frontend:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}/sms-frontend:latest
