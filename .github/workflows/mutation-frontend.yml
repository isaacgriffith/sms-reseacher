name: Frontend Mutation Tests (Stryker)

# Trigger mechanism (FR-013):
#   - workflow_dispatch: Manually from Actions → Frontend Mutation Tests → Run workflow
#   - workflow_call:     Automatically at speckit end-of-feature completion.
#
# NOTE: The workflow_call invocation from speckit is not yet wired up in
# .specify/scripts/bash/ (no end-of-feature hook exists as of 2026-03-15).
# When that hook is created, it should call this workflow via:
#   uses: ./.github/workflows/mutation-frontend.yml
# Track this in the speckit scripts backlog.

on:
  workflow_dispatch:
  workflow_call:

jobs:
  # ── Frontend Mutation Testing (Stryker) ───────────────────────────────────────
  frontend-mutation:
    name: Frontend Mutation (Stryker)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Run Stryker mutation tests
        run: npx stryker run
        working-directory: frontend

      - name: Upload Stryker HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: stryker-mutation-report
          path: frontend/reports/mutation/
